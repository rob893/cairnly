name: Build & Test UI
description: >-
  Shared Node.js setup, install, lint, test, and build for the cairnly-ui.
  Artifact upload stays in the calling deploy workflow.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: '24'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: cairnly-ui/package-lock.json

    - name: Install packages
      run: npm ci
      shell: bash
      working-directory: cairnly-ui

    - name: Audit dependencies
      run: npm audit --audit-level=high
      shell: bash
      working-directory: cairnly-ui

    - name: Lint
      run: npm run lint
      shell: bash
      working-directory: cairnly-ui

    - name: Test
      run: npm run test
      shell: bash
      working-directory: cairnly-ui

    - name: Build
      run: npm run build
      shell: bash
      working-directory: cairnly-ui
