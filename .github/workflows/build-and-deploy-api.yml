# Build and Deploy API — Cairnly.API → Azure App Service
#
# Auth model: OIDC (no long-lived secrets). Configure a federated credential on
# your Azure AD app registration with subject:
#   repo:<owner>/<repo>:ref:refs/heads/main
#
# Required secrets (Settings → Secrets and variables → Actions → Secrets):
#   AZURE_CLIENT_ID          - App registration / managed identity client ID
#   AZURE_TENANT_ID          - Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID    - Azure subscription ID
#
# Required vars (Settings → Secrets and variables → Actions → Variables):
#   (none) — the resource group and web app names come from the Bicep parameters file
#   (CI/Azure/parameters/main.parameters.dev.json), so there is nothing to duplicate here.
#
# The infra deploy is SUBSCRIPTION-scoped: it CREATES the Cairnly resource group
# (rherber-cairnly-rg-uc-d, from the parameters file) and also creates the App Service
# + VM NSG rule and assigns a Key Vault role in the shared RG. The deploy identity
# therefore needs Contributor on the subscription (or on both resource groups).
# PostgreSQL runs on the shared VM, so there is no managed database to provision.

name: Build and Deploy API

on:
  push:
    branches:
      - main
    paths:
      - 'Cairnly.API/**'
  workflow_dispatch:

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup & restore .NET
        uses: ./.github/actions/build-test-api
        with:
          run-build-test: 'false'

      - name: Publish
        run: dotnet publish Cairnly.API -c Release -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cairnly-api-b${{ github.run_number }}
          path: publish
          retention-days: 30

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # required for OIDC token request
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: cairnly-api-b${{ github.run_number }}
          path: publish

      - name: Log in to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Optional infrastructure step: provisions/updates all Azure resources via Bicep.
      # Runs on manual dispatch so you can apply infra changes on demand without a full
      # code push. This is a SUBSCRIPTION-scoped deployment: it creates the Cairnly
      # resource group itself (name comes from the parameters file) and also touches the
      # shared RG, so the deploy identity needs Contributor on the subscription (or on
      # both the Cairnly and shared resource groups).
      - name: Deploy Bicep infrastructure
        if: github.event_name == 'workflow_dispatch'
        run: |
          az deployment sub create \
            --location centralus \
            --template-file CI/Azure/main.bicep \
            --parameters @CI/Azure/parameters/main.parameters.dev.json

      # Derive the web app name from the same Bicep parameters that provision it, so the
      # naming convention lives in exactly one place (no duplicated GitHub variable to drift).
      - name: Resolve web app name from Bicep parameters
        id: appname
        run: |
          params=CI/Azure/parameters/main.parameters.dev.json
          prefix=$(jq -r '.parameters.namePrefix.value' "$params")
          region=$(jq -r '.parameters.regionToken.value' "$params")
          env=$(jq -r '.parameters.environment.value' "$params")
          echo "name=${prefix}-api-${region}-${env}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.appname.outputs.name }}
          package: publish
