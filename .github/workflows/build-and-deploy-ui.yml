# Build and Deploy UI — cairnly-ui → GitHub Pages
#
# Prerequisites:
#   1. Enable GitHub Pages: Settings → Pages → Source → GitHub Actions
#   2. If deploying to a project site (not a user/org site), set the Vite base path
#      in cairnly-ui/vite.config.ts:
#        base: '/<repo-name>/'        (e.g. '/cairnly/')
#      For a custom domain or user/org site (username.github.io), use:
#        base: '/'
#      The UI already uses HashRouter, so client-side routing works on Pages.
#
# Configuration:
#   The deployed API base URL is committed, non-secret config in
#   cairnly-ui/.env.production (read automatically at build time). No CI
#   variables or secrets are required for this UI deploy.

name: Build and Deploy UI

on:
  push:
    branches:
      - main
    paths:
      - 'cairnly-ui/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false # let an in-progress deploy finish before starting another

jobs:
  build:
    name: Build UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Build & test UI
        uses: ./.github/actions/build-test-ui

      # Path is relative to workspace root; working-directory default does not apply to `uses` steps
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: cairnly-ui/dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
