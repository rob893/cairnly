name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  api:
    name: Build & Test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Build & test API
        uses: ./.github/actions/build-test-api

  ui:
    name: Build & Test UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Build & test UI
        uses: ./.github/actions/build-test-ui
